name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install package dependencies
        run: composer install --no-interaction --prefer-dist

      - name: Validate composer metadata
        run: composer validate --no-check-lock --no-plugins

      - name: Run PHPStan
        run: |
          php -r '
              $data = json_decode(file_get_contents("composer.json"), true);
              if (!is_array($data)) {
                  fwrite(STDERR, "invalid composer.json\n");
                  exit(1);
              }
              if (!isset($data["scripts"]["phpstan"])) {
                  exit(0);
              }
          '
          composer run phpstan

      - name: Run fast package tests
        run: vendor/bin/phpunit --configuration tests/phpunit.xml.dist --testsuite=unit --display-deprecations --display-phpunit-notices
